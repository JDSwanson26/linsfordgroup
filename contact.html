<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; font-family:'DM Sans',system-ui,sans-serif; color:#16324f; background:#fff; -webkit-font-smoothing:antialiased; }
    h1,h2,h3,h4 { font-family:'Poppins',sans-serif; margin:0; }
    a { color:#e0961e; } a:hover { color:#c07f12; }
    ::selection { background:#e0961e; color:#0f2d4d; }
    @keyframes blobA { 0%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,40px) scale(1.2);} 100%{transform:translate(0,0) scale(1);} }
    @media (max-width: 980px) {
      .contact-hero { padding:120px 18px 70px !important; }
      .page-section { padding:50px 18px 80px !important; }
      .stack-cols-2 { grid-template-columns:1fr !important; }
      .contact-card { flex-direction:column !important; }
      .contact-card div:first-child { margin-bottom:16px !important; }
      .contact-card > div:last-child { width:100% !important; }
    }
  </style>
  <script src="./image-slot.js"></script>
</helmet>

<dc-import name="spotlight" hint-size="0,0"></dc-import>
<dc-import name="site-nav" active="contact" hint-size="100%,72px"></dc-import>

<div style="width:100%;overflow-x:hidden;">

  <section class="contact-hero" style="position:relative;overflow:hidden;background:#0f2d4d;padding:170px 24px 90px;text-align:center;">
    <div style="position:absolute;top:0;right:12%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(224,150,30,0.22),transparent 70%);z-index:2;animation:blobA 20s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:relative;z-index:3;max-width:760px;margin:0 auto;">
      <span style="font-weight:600;letter-spacing:0.28em;text-transform:uppercase;font-size:13px;color:#e0961e;">Get In Touch</span>
      <h1 style="font-size:clamp(40px,6vw,72px);font-weight:800;letter-spacing:-0.03em;color:#fff;margin-top:14px;">Contact Us</h1>
      <p style="font-size:clamp(16px,2vw,19px);line-height:1.6;color:rgba(255,255,255,0.8);margin-top:18px;">We're here to help with all your clearing and forwarding needs.</p>
    </div>
  </section>

  <section class="page-section stack-cols-2" style="max-width:1120px;margin:0 auto;padding:90px 32px 60px;display:grid;grid-template-columns:1fr 1fr;gap:26px;">
    <sc-for list="{{ cards }}" as="c" hint-placeholder-count="4">
      <div class="contact-card" style="background:#fff;border:1px solid #e9edf2;border-radius:20px;padding:34px;display:flex;gap:20px;align-items:flex-start;box-shadow:0 26px 56px -42px rgba(15,45,77,0.5);transition:transform .2s ease,box-shadow .2s ease;" style-hover="transform:translateY(-5px);box-shadow:0 40px 80px -42px rgba(15,45,77,0.55);">
        <div style="width:54px;height:54px;border-radius:14px;background:rgba(224,150,30,0.12);display:flex;align-items:center;justify-content:center;color:#e0961e;flex-shrink:0;">{{ c.icon }}</div>
        <div>
          <h3 style="font-size:17px;font-weight:600;color:#16324f;">{{ c.title }}</h3>
          <p style="font-size:14.5px;line-height:1.7;color:#5a6b7b;margin-top:8px;white-space:pre-line;">{{ c.body }}</p>
        </div>
      </div>
    </sc-for>
  </section>

  <!-- MAP + MESSAGE -->
  <section class="page-section stack-cols-2" style="max-width:1120px;margin:0 auto;padding:40px 32px 100px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:stretch;">
    <div style="border-radius:22px;overflow:hidden;min-height:440px;box-shadow:0 40px 80px -46px rgba(15,45,77,0.5);border:1px solid #e9edf2;">
      <iframe title="Linsford Group location" src="https://www.google.com/maps?q=Montague+Gardens+Cape+Town&output=embed" style="width:100%;height:100%;min-height:440px;border:0;display:block;"></iframe>
    </div>
    <div style="background:#f7f9fb;border:1px solid #e9edf2;border-radius:22px;padding:40px;">
      <h3 style="font-size:22px;font-weight:600;color:#16324f;">Send us a message</h3>
      <p style="font-size:14.5px;color:#6a7987;margin-top:6px;">We'll get back to you within one business day.</p>
      <div class="stack-cols-2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;">
        <div>
          <label style="font-size:13px;font-weight:600;color:#16324f;">Name <span style="color:#e0961e;">*</span></label>
          <input value="{{ form.name }}" onInput="{{ setName }}" placeholder="John Smith" style="{{ inputStyle }}" style-focus="border-color:#e0961e;box-shadow:0 0 0 3px rgba(224,150,30,0.16);">
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:#16324f;">Phone</label>
          <input value="{{ form.phone }}" onInput="{{ setPhone }}" placeholder="+27 XX XXX XXXX" style="{{ inputStyle }}" style-focus="border-color:#e0961e;box-shadow:0 0 0 3px rgba(224,150,30,0.16);">
        </div>
      </div>
      <label style="display:block;font-size:13px;font-weight:600;color:#16324f;margin-top:18px;">Email <span style="color:#e0961e;">*</span></label>
      <input value="{{ form.email }}" onInput="{{ setEmail }}" placeholder="john@company.com" style="{{ inputStyle }}" style-focus="border-color:#e0961e;box-shadow:0 0 0 3px rgba(224,150,30,0.16);">
      <label style="display:block;font-size:13px;font-weight:600;color:#16324f;margin-top:18px;">Message <span style="color:#e0961e;">*</span></label>
      <textarea value="{{ form.message }}" onInput="{{ setMessage }}" placeholder="How can we help?" rows="5" style="{{ textareaStyle }}" style-focus="border-color:#e0961e;box-shadow:0 0 0 3px rgba(224,150,30,0.16);"></textarea>
      <button onClick="{{ submit }}" style="width:100%;margin-top:24px;background:#e0961e;color:#0f2d4d;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.04em;padding:16px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 16px 34px -14px rgba(224,150,30,0.85);transition:transform .18s ease;" style-hover="transform:translateY(-2px);">Send Message →</button>
    </div>
  </section>

</div>

<dc-import name="site-footer" hint-size="100%,420px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { form: { name: '', phone: '', email: '', message: '' } };
  set(f) { return (e) => this.setState(s => ({ form: { ...s.form, [f]: e.target.value } })); }

  renderVals() {
    const f = this.state.form;
    const inputStyle = "width:100%;margin-top:7px;padding:13px 14px;border:1px solid #dde3ea;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14.5px;color:#16324f;outline:none;background:#fff;transition:border-color .16s,box-shadow .16s;";
    const textareaStyle = inputStyle + 'resize:vertical;';
    const svg = (p) => React.createElement('svg', { width: 24, height: 24, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', dangerouslySetInnerHTML: { __html: p } });
    const submit = () => {
      const body = `Name: ${f.name}\nEmail: ${f.email}\nPhone: ${f.phone}\n\n${f.message}`;
      window.location.href = `mailto:info@linsfordgroup.co.za?subject=${encodeURIComponent('Website enquiry')}&body=${encodeURIComponent(body)}`;
    };
    return {
      form: f, inputStyle, textareaStyle,
      setName: this.set('name'), setPhone: this.set('phone'), setEmail: this.set('email'), setMessage: this.set('message'),
      submit,
      cards: [
        { title: 'Physical Address', body: 'Unit C, Parc Dumont,\n20 Railway Road,\nMontague Gardens,\nCape Town, South Africa', icon: svg('<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>') },
        { title: 'Call Us', body: 'Tel: +27 21 552 6577\nFax: +27 21 552 6801', icon: svg('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>') },
        { title: 'Email Us', body: 'Exports: lynn@linsfordgroup.co.za\nImports: justin@linsfordgroup.co.za\nGeneral: info@linsfordgroup.co.za', icon: svg('<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>') },
        { title: 'Office Hours', body: 'Mon – Fri: 08:00 – 17:00\nSat – Sun: Closed\nPublic holidays: Closed', icon: svg('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>') },
      ],
    };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../js/support.js"></script>
</head>
<body class="page-gallery">
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <script src="../js/image-slot.js"></script>
</helmet>

<dc-import name="spotlight" hint-size="0,0"></dc-import>
<dc-import name="site-nav" active="gallery" hint-size="100%,72px"></dc-import>

<div style="width:100%;overflow-x:hidden;">

  <section class="gallery-hero" data-tone="dark" style="position:relative;overflow:hidden;background:#0f2d4d;padding:170px 24px 90px;text-align:center;">
    <div style="position:absolute;top:0;right:12%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(224,150,30,0.22),transparent 70%);z-index:2;animation:blob-drift 20s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:relative;z-index:3;max-width:760px;margin:0 auto;">
      <span style="font-weight:600;letter-spacing:0.28em;text-transform:uppercase;font-size:13px;color:#e0961e;">Our Work</span>
      <h1 style="font-size:clamp(40px,6vw,72px);font-weight:800;letter-spacing:-0.03em;color:#fff;margin-top:14px;">Gallery</h1>
      <p style="font-size:clamp(16px,2vw,19px);line-height:1.6;color:rgba(255,255,255,0.8);margin-top:18px;">Explore our operations through our facilities, equipment and daily activities</p>
    </div>
  </section>

  <section style="max-width:1240px;margin:0 auto;padding:80px 32px 110px;">
    <div class="gallery-grid" style="display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:240px;gap:18px;">
      <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="10">
        <div style="{{ t.wrap }}" style-hover="transform:scale(1.04);box-shadow:0 36px 70px -34px rgba(15,45,77,0.6) !important;">
          <image-slot id="{{ t.id }}" shape="rect" fit="cover" placeholder="{{ t.label }}" src="{{ t.src }}"></image-slot>
          <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(15,45,77,0.72),transparent 55%);opacity:0;transition:opacity .28s ease;display:flex;align-items:flex-end;padding:20px;" style-hover="opacity:1 !important;">
            <span style="font-family:'Poppins',sans-serif;font-weight:600;font-size:16px;color:#fff;">{{ t.label }}</span>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <section class="gallery-cta" data-tone="dark" style="position:relative;overflow:hidden;background:#0f2d4d;padding:96px 32px;text-align:center;">
    <div style="position:absolute;top:-40px;left:10%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(224,150,30,0.2),transparent 70%);animation:blob-drift 22s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:relative;z-index:1;max-width:720px;margin:0 auto;">
      <h2 style="font-size:clamp(30px,3.6vw,46px);font-weight:700;color:#fff;">Let's move your cargo</h2>
      <a href="quote.html" style="display:inline-flex;align-items:center;gap:10px;background:#e0961e;color:#0f2d4d;font-weight:600;font-size:15px;padding:17px 32px;border-radius:12px;margin-top:28px;text-decoration:none;box-shadow:0 20px 44px -14px rgba(224,150,30,0.9);transition:transform .18s ease,background .18s ease,color .18s ease;" style-hover="transform:translateY(-3px);background:#0f2d4d !important;color:#e0961e !important;">Get a Quote →</a>
    </div>
  </section>

</div>

<dc-import name="site-footer" hint-size="100%,420px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const base = 'position:relative;overflow:hidden;border-radius:18px;box-shadow:0 26px 56px -36px rgba(15,45,77,0.55);transition:transform .28s ease,box-shadow .28s ease;';
    const spans = [
      { label: 'Container ship at port', span: 'grid-column:span 2;grid-row:span 2;', src: '../assets/images/container-ship.jpg' },
      { label: 'Port crane operations', span: '', src: '../assets/images/port-crane.webp' },
      { label: 'Container yard', span: '', src: '../assets/images/gallery-3.jpg' },
      { label: 'Warehouse storage', span: 'grid-column:span 2;', src: '../assets/images/warehouse.jpg' },
      { label: 'Air freight loading', span: '', src: '../assets/images/gallery-4.jpg' },
      { label: 'Customs inspection', span: '', src: '../assets/images/gallery-1.jpg' },
      { label: 'Truck haulage', span: 'grid-column:span 2;', src: '../assets/images/gallery-2.jpg' },
      { label: 'Machinery transport', span: '', src: '../assets/images/contact-hero.jpg' },
      { label: 'Team at work', span: '', src: '../assets/images/gallery-1.jpg' },
    ];
    const tiles = spans.map((s, i) => ({
      id: 'lg-gal-' + (i + 1),
      label: s.label,
      wrap: base + s.span,
      src: s.src,
    }));
    return { tiles };
  }
}
</script>
</body>
</html>

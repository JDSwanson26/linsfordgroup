<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/header.css">
  <script src="../js/image-slot.js"></script>
</helmet>
<header style="{{ headerStyle }}">
  <nav class="site-nav__container">
    <a href="index.html" style="display:flex;align-items:center;gap:12px;flex-shrink:0;text-decoration:none;">
      <div style="width:44px;height:44px;border-radius:12px;overflow:hidden;background:#f4f6f8;flex-shrink:0;">
        <image-slot id="lg-logo" shape="rounded" radius="12" fit="cover" placeholder="logo" src="../assets/images/logo.png"></image-slot>
      </div>
      <span style="font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em;color:#16324f;">Linsford<span style="color:#e0961e;">Group</span></span>
    </a>
    <div class="site-nav__links">
      <sc-for list="{{ links }}" as="lk" hint-placeholder-count="5">
        <a href="{{ lk.href }}" style="{{ lk.style }}" style-hover="color:#e0961e !important;background:rgba(224,150,30,0.1) !important;">{{ lk.label }}</a>
      </sc-for>
    </div>
    <a class="site-nav__quote" href="quote.html" style="background:#e0961e;color:#0f2d4d;font-family:'Poppins',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:0.04em;text-transform:uppercase;padding:12px 22px;border-radius:10px;text-decoration:none;box-shadow:0 10px 26px -10px rgba(224,150,30,0.85);transition:transform .18s ease,box-shadow .18s ease,background .18s ease;" style-hover="transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(15,45,77,0.35) !important;background:#0f2d4d !important;color:#e0961e !important;">Get a Quote</a>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;gallery&quot;,&quot;downloads&quot;,&quot;contact&quot;,&quot;quote&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}">
class Component extends DCLogic {
  state = { hidden: false };

  componentDidMount() {
    this._lastY = window.scrollY;
    this._ticking = false;
    this._onScroll = () => {
      if (this._ticking) return;
      this._ticking = true;
      requestAnimationFrame(() => {
        const y = window.scrollY;
        const isMobile = window.matchMedia('(max-width: 980px)').matches;
        const delta = y - this._lastY;
        if (isMobile && y > 90 && delta > 6 && !this.state.hidden) {
          this.setState({ hidden: true });
        } else if ((!isMobile || y <= 90 || delta < -6) && this.state.hidden) {
          this.setState({ hidden: false });
        }
        this._lastY = y;
        this._ticking = false;
      });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
  }
  componentWillUnmount() {
    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);
  }

  renderVals() {
    const headerStyle = `position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(15,45,77,0.07);box-shadow:0 4px 24px -12px rgba(15,45,77,0.18);transition:transform .2s ease;transform:${this.state.hidden ? 'translateY(-100%)' : 'translateY(0)'};`;
    const active = this.props.active || 'home';
    const items = [
      { key: 'home', label: 'Home', href: 'index.html' },
      { key: 'services', label: 'Services', href: 'services.html' },
      { key: 'gallery', label: 'Gallery', href: 'gallery.html' },
      { key: 'downloads', label: 'Downloads', href: 'downloads.html' },
      { key: 'contact', label: 'Contact Us', href: 'contact.html' },
    ];
    const links = items.map(it => {
      const on = it.key === active;
      return {
        label: it.label,
        href: it.href,
        style: `text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:${on ? 600 : 500};font-size:15px;padding:9px 15px;border-radius:9px;transition:color .16s ease,background .16s ease;color:#16324f;background:transparent;`,
      };
    });
    return { links, headerStyle };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../js/support.js"></script>
</head>
<body class="page-downloads">
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <script src="../js/image-slot.js"></script>
</helmet>

<dc-import name="spotlight" hint-size="0,0"></dc-import>
<dc-import name="site-nav" active="downloads" hint-size="100%,72px"></dc-import>

<div style="width:100%;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;">

  <section class="downloads-hero" data-tone="dark" style="position:relative;overflow:hidden;background:#0f2d4d;padding:170px 24px 90px;text-align:center;">
    <div style="position:absolute;top:0;right:12%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(224,150,30,0.22),transparent 70%);z-index:2;animation:blob-drift 20s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:relative;z-index:3;max-width:760px;margin:0 auto;">
      <span style="font-weight:600;letter-spacing:0.28em;text-transform:uppercase;font-size:13px;color:#e0961e;">Resources</span>
      <h1 style="font-size:clamp(40px,6vw,72px);font-weight:800;letter-spacing:-0.03em;color:#fff;margin-top:14px;">Downloads</h1>
      <p style="font-size:clamp(16px,2vw,19px);line-height:1.6;color:rgba(255,255,255,0.8);margin-top:18px;">Forms, rate cards and company documentation — everything you need to get started with us</p>
    </div>
  </section>

  <section style="flex:1;max-width:1000px;margin:0 auto;width:100%;padding:80px 32px 110px;">
    <div class="downloads-list" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <sc-for list="{{ docs }}" as="d" hint-placeholder-count="6">
        <a href="{{ d.href }}" download style="display:flex;align-items:center;gap:20px;background:#fff;border:1px solid #e9edf2;border-radius:18px;padding:26px 28px;text-decoration:none;box-shadow:0 24px 54px -40px rgba(15,45,77,0.5);transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;" style-hover="transform:translateY(-4px);box-shadow:0 38px 74px -40px rgba(15,45,77,0.55) !important;border-color:#e0961e !important;">
          <div style="width:54px;height:54px;border-radius:14px;background:rgba(224,150,30,0.12);display:flex;align-items:center;justify-content:center;color:#e0961e;flex-shrink:0;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M12 18v-6"></path><path d="m9 15 3 3 3-3"></path></svg>
          </div>
          <div style="flex:1;min-width:0;">
            <h3 style="font-size:17px;font-weight:600;color:#16324f;">{{ d.title }}</h3>
            <p style="font-size:14px;color:#6a7987;margin-top:4px;">{{ d.meta }}</p>
          </div>
          <span style="color:#e0961e;font-weight:600;font-size:14px;white-space:nowrap;">Download ↓</span>
        </a>
      </sc-for>
    </div>
    <p style="text-align:center;font-size:13.5px;color:#8a97a4;margin-top:40px;">Replace the placeholder links with your real PDF files. Drop the documents into the project and point each card's <code>href</code> at them.</p>
  </section>

</div>

<dc-import name="site-footer" hint-size="100%,420px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      docs: [
        { title: 'Import Instruction Form', meta: 'PDF · Fillable form', href: '#' },
        { title: 'Export Instruction Form', meta: 'PDF · Fillable form', href: '#' },
        { title: 'Client Credit Application', meta: 'PDF · Account opening', href: '#' },
        { title: 'Rate Card 2026', meta: 'PDF · Pricing schedule', href: '#' },
        { title: 'Company Profile', meta: 'PDF · About Linsford Group', href: '#' },
        { title: 'Terms & Conditions of Trade', meta: 'PDF · Legal', href: '#' },
      ],
    };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @media (hover: none), (pointer: coarse) {
      .spotlight-glow { display: none !important; }
    }
  </style>
</helmet>
<div class="spotlight-glow" style="position:fixed;top:0;left:0;width:720px;height:720px;margin-left:-360px;margin-top:-360px;border-radius:50%;pointer-events:none;z-index:60;mix-blend-mode:soft-light;background:radial-gradient(circle, rgba(224,150,30,0.55), rgba(224,150,30,0.14) 42%, transparent 70%);transform:translate({{ mx }}px, {{ my }}px);transition:transform .16s ease-out;will-change:transform;"></div>
<div class="spotlight-glow" style="position:fixed;top:0;left:0;width:340px;height:340px;margin-left:-170px;margin-top:-170px;border-radius:50%;pointer-events:none;z-index:61;mix-blend-mode:overlay;background:radial-gradient(circle, rgba(255,255,255,0.35), transparent 65%);transform:translate({{ mx }}px, {{ my }}px);transition:transform .09s ease-out;will-change:transform;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { mx: (typeof window !== 'undefined' ? window.innerWidth / 2 : 640), my: (typeof window !== 'undefined' ? window.innerHeight / 2 : 360) };

  componentDidMount() {
    this._onMove = (e) => this.setState({ mx: e.clientX, my: e.clientY });
    window.addEventListener('pointermove', this._onMove, { passive: true });
  }
  componentWillUnmount() {
    if (this._onMove) window.removeEventListener('pointermove', this._onMove);
  }

  renderVals() {
    return { mx: this.state.mx, my: this.state.my };
  }
}
</script>
</body>
</html>

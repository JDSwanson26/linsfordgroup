<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    .site-nav__container { max-width:1240px; margin:0 auto; padding:13px 32px; display:flex; align-items:center; gap:40px; }
    .site-nav__links { display:flex; align-items:center; gap:6px; margin-left:auto; flex-wrap:wrap; }
    .site-nav__quote { white-space:nowrap; }
    @media (max-width: 980px) {
      .site-nav__container { padding:13px 18px; gap:12px; flex-wrap:wrap; }
      .site-nav__links { width:100%; justify-content:center; order:2; margin-left:0; gap:10px; }
      .site-nav__quote { order:3; width:100%; display:flex; justify-content:center; }
      .site-nav__links a { white-space: normal; }
    }
  </style>
  <script src="./image-slot.js"></script>
</helmet>
<header style="position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(15,45,77,0.07);box-shadow:0 4px 24px -12px rgba(15,45,77,0.18);">
  <nav class="site-nav__container">
    <a href="index.html" style="display:flex;align-items:center;gap:12px;flex-shrink:0;text-decoration:none;">
      <span style="font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em;color:#16324f;">Linsford<span style="color:#e0961e;">Group</span></span>
    </a>
    <div class="site-nav__links">
      <sc-for list="{{ links }}" as="lk" hint-placeholder-count="5">
        <a href="{{ lk.href }}" style="{{ lk.style }}">{{ lk.label }}</a>
      </sc-for>
    </div>
    <a class="site-nav__quote" href="quote.html" style="background:#e0961e;color:#0f2d4d;font-family:'Poppins',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:0.04em;text-transform:uppercase;padding:12px 22px;border-radius:10px;text-decoration:none;box-shadow:0 10px 26px -10px rgba(224,150,30,0.85);transition:transform .18s ease,box-shadow .18s ease;" style-hover="transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(224,150,30,0.9);color:#0f2d4d;">Get a Quote</a>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;gallery&quot;,&quot;downloads&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const items = [
      { key: 'home', label: 'Home', href: 'index.html' },
      { key: 'services', label: 'Services', href: 'services.html' },
      { key: 'gallery', label: 'Gallery', href: 'gallery.html' },
      { key: 'downloads', label: 'Downloads', href: 'downloads.html' },
      { key: 'contact', label: 'Contact Us', href: 'contact.html' },
    ];
    const links = items.map(it => {
      const on = it.key === active;
      return {
        label: it.label,
        href: it.href,
        style: `text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:${on ? 600 : 500};font-size:15px;padding:9px 15px;border-radius:9px;transition:color .16s ease,background .16s ease;color:${on ? '#e0961e' : '#16324f'};background:${on ? 'rgba(224,150,30,0.1)' : 'transparent'};`,
      };
    });
    return { links };
  }
}
</script>
</body>
</html>
